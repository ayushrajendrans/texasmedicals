<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Internal Server Error</title>
    <!-- Import Google font (Inter) -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #3b558c; /* Matched to the image background */
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 400;
            margin: 0 0 10px;
            letter-spacing: -1px;
        }

        .error-message {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 35px;
        }

        .divider {
            width: 70%;
            max-width: 600px;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.4);
            margin: 0 auto 35px;
        }

        .instructions {
            font-size: 1.05rem;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .button-group {
            margin-top: 45px;
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #ffffff;
            color: #333333;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        
        @media (max-width: 600px) {
            .error-code {
                font-size: 4rem;
            }
            .error-message {
                font-size: 1.2rem;
            }
            .button-group {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="error-code">500</h1>
        <h2 class="error-message">Looks like we are having some server issues.</h2>
        
        <div class="divider"></div>
        
        <p class="instructions">You may want to head back to the homepage.</p>
        <p class="instructions">If you think something is broken, report a problem.</p>

        <div class="button-group">
            <a href="index.html" class="btn">Go to Homepage</a>
            <a href="p/contact.html" class="btn">Report a Problem</a>
        </div>
    </div>
</body>
</html>
